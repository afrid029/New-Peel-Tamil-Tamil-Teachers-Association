    <path d="M1290 480 Q1290 440 1300 430 Q1310 440 1310 480Z"/>
    <path d="M1295 425 Q1300 410 1305 425"/>
    <!-- Om symbol suggestion / Tamil letter -->
    <circle cx="500" cy="130" r="25" fill="none" stroke="#fff" stroke-width="2.5" opacity="0.12"/>
    <circle cx="950" cy="500" r="20" fill="none" stroke="#fff" stroke-width="2" opacity="0.12"/>
    <!-- Geometric patterns -->
    <rect x="60" y="500" width="40" height="40" rx="4" fill="none" stroke="#fff" stroke-width="2" opacity="0.12"/>
    <rect x="1350" y="130" width="35" height="35" rx="4" fill="none" stroke="#fff" stroke-width="2" opacity="0.12"/>
    <!-- Wave lines at bottom -->
    <path d="M0 560 Q180 530 360 560 Q540 590 720 560 Q900 530 1080 560 Q1260 590 1440 560 L1440 600 L0 600Z" opacity="0.06"/>
    <path d="M0 575 Q180 550 360 575 Q540 600 720 575 Q900 550 1080 575 Q1260 600 1440 575 L1440 600 L0 600Z" opacity="0.04"/>
