      <stop offset="0%" stop-color="#1a2a5e"/>
      <stop offset="100%" stop-color="#2d4a8a"/>
    </linearGradient>
  </defs>
  <rect fill="url(#bg)" width="1440" height="600"/>
  <!-- Books / education motifs -->
  <g opacity="0.12" fill="#fff">
