    <circle cx="200" cy="150" r="4"/>
    <circle cx="350" cy="100" r="3"/>
    <circle cx="1200" cy="120" r="5"/>
    <circle cx="1050" cy="80" r="3"/>
    <circle cx="900" cy="450" r="4"/>
    <circle cx="500" cy="500" r="3"/>
    <circle cx="150" cy="300" r="3"/>
    <circle cx="1300" cy="350" r="4"/>
