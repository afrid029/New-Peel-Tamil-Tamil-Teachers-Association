    <rect x="1100" y="180" width="8" height="120" rx="2" transform="rotate(-25 1104 240)"/>
    <polygon points="1082,310 1090,330 1098,310" transform="rotate(-25 1090 320)"/>
    <!-- Graduation cap -->
    <polygon points="720,120 640,160 720,200 800,160"/>
    <rect x="710" y="200" width="20" height="40" rx="2"/>
    <line x1="800" y1="160" x2="810" y2="220" stroke="#fff" stroke-width="3" opacity="0.12"/>
    <circle cx="810" cy="225" r="6"/>
